server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback - any path that isn't a real file gets index.html.
    # Without this, refreshing on /devices returns a 404 from Nginx.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/ calls to the backend container.
    # 'backend' is resolved by Docker's internal DNS on pihub-net.
    # This avoids CORS entirely - the browser only ever talks to Nginx.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}